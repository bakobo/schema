# Zensical config for the browsable schema site (this.i @z5nc4d). The docs/
# source tree is GENERATED from the corpus by `schematools build-docs`; this
# config renders it to HTML that is merged over the machine site (@o6bw3k).

[project]
# The docs tree is GENERATED into _docs by `schematools build-docs` (it folds in
# the committed docs/ and adds per-schema pages); never edit _docs by hand.
docs_dir = "_docs"
site_name = "Bakobo ACDC schemas"
site_description = "Registry of general-purpose ACDC (Authentic Chained Data Container) credential schemas for KERI verifiable credentials — each a JSON Schema addressed by its SAID and resolvable as an OOBI."
site_url = "https://schema.bakobo.com/"
repo_url = "https://github.com/bakobo/schema"
repo_name = "bakobo/schema"
copyright = "Apache-2.0. Derived from provenant-dev/public-schema."

# Explicit, FLAT nav: each entry maps a label straight to a schema's index page,
# so the sidebar renders one plain link per schema (no collapsible folder with an
# index child). Each page still lives at <name>/index.md so its relative links to
# the schema JSON and icons resolve. When adding a schema, add one line here.
nav = [
    { "Home" = "index.md" },
    { "Ecosystem" = "ecosystem.md" },
    { "GCD" = "gcd/index.md" },
    { "GCD 1.0.0 (archived)" = "gcd-1.0.0/index.md" },
    { "AI coder" = "ai-coder/index.md" },
    { "AI user code of conduct" = "ai-user-coca/index.md" },
    { "Attestation" = "attestation/index.md" },
    { "Award" = "award/index.md" },
    { "Bind key" = "bindkey/index.md" },
    { "Citation" = "citation/index.md" },
    { "Face-to-face" = "face-to-face/index.md" },
    { "Foreign artifact affidavit" = "faa/index.md" },
    { "Org vet" = "org-vet/index.md" },
    { "Proof of control" = "proof-of-control/index.md" },
    { "Schema house style" = "style.md" },
]

[project.theme]
features = [
    "navigation.instant",
    "navigation.top",
    "content.code.copy",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
