name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/py
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: "tools/py/uv.lock"
      - name: Install dependencies (frozen)
        run: uv sync --frozen
      - name: Run tests (pytest + 100% branch coverage gate)
        run: uv run pytest
