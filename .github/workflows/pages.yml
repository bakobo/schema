name: Deploy to GitHub Pages

# Publishes the schema corpus to https://schema.bakobo.com so every schema is
# resolvable as raw JSON at a stable URL (the foundation for ACDC OOBIs). This
# is a minimal static deploy; the richer docs site is a later thread. It is
# FAIL-CLOSED: the corpus is linted first, and nothing publishes if a schema,
# registry entry, example, or negative fixture is broken.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; let a newer push supersede an older run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "tools/py/uv.lock"

      - name: Build the machine site (lints first; fail closed)
        run: |
          uv sync --frozen --group docs --project tools/py
          uv run --project tools/py schematools publish --root . --out _site

      - name: Render browsable HTML with Zensical and merge over the machine site
        run: |
          uv run --project tools/py schematools build-docs --root . --out _docs
          uv run --project tools/py --group docs zensical build
          cp -r site/. _site/

      # NOTE: we do NOT use actions/upload-pages-artifact — it tars the site with
      # `--exclude ".[^/]*"`, which drops top-level dot-entries and would strip our
      # /.well-known/ directory. We build the identical `github-pages` artifact
      # ourselves (a plain tar of _site), excluding only .git, so .well-known ships.
      # The Pages CDN serves .well-known fine (this.i @o6bw3k).
      - name: Archive the site as the github-pages artifact (keeping .well-known)
        run: |
          tar --dereference --hard-dereference --directory _site \
            -cvf "$RUNNER_TEMP/artifact.tar" --exclude=.git .

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: "1"
          include-hidden-files: "true"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
